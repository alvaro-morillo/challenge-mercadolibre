        <!-- Modal de login -->
<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 class="modal-title text-primary-emphasis" id="loginModalLabel">Ingresá a tu cuenta</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body bg-body-secondary">
        <form>
          <div class="mb-3">
            
            <input type="text" class="form-control" id="nombreUsuario" placeholder="Nombre de usuario" required>
          </div>
          <div class="mb-3">
            <input type="password" class="form-control" id="contraseña" placeholder="Contraseña" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
      </div>

    </div>
  </div>
</div>

    <!-- Modal de Registro -->
<div class="modal fade" id="registroModal" tabindex="-1" aria-labelledby="registroModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="registroModalLabel">Registro de usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body bg-body-secondary">
        <form id="formRegistro">

          <!-- Imagen de perfil -->
          <div class="text-center mb-3">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Foto de perfil" width="100" class="rounded-circle mb-2">
            <div>
              <input type="file" class="form-control w-auto mx-auto" id="fotoPerfil">
              <small class="text-muted">Agregar foto de perfil</small>
            </div>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <input type="text" class="form-control" placeholder="Nombre y Apellido" required>
            </div>
            <div class="col-md-6">
              <input type="text" class="form-control" placeholder="Nombre de usuario" required>
            </div>
            <div class="col-md-6">
              <input type="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="col-md-6">
              <input type="date" class="form-control" placeholder="Fecha de nacimiento" required>
            </div>
            <div class="col-12">
              <input type="text" class="form-control" placeholder="Domicilio" required>
            </div>
          </div>

          <!-- Rol -->
          <div class="mt-4">
            <label class="form-label fw-bold">Rol:</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="rol" id="vender" value="vender">
              <label class="form-check-label" for="vender">Vender</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="rol" id="comprar" value="comprar">
              <label class="form-check-label" for="comprar">Comprar</label>
            </div>
          </div>

          <!-- Categorías -->
          <div class="mt-4">
            <label class="form-label fw-bold">Categorías</label>
            <div class="row">
              <div class="col-6 col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="Electro" id="electro">
                  <label class="form-check-label" for="electro">Electro</label>
                </div>
              </div>
              <div class="col-6 col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="Moda" id="moda">
                  <label class="form-check-label" for="moda">Moda</label>
                </div>
              </div>
              <div class="col-6 col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="Hogar" id="hogar">
                  <label class="form-check-label" for="hogar">Hogar</label>
                </div>
              </div>
              <div class="col-6 col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="Juguetería" id="jugueteria">
                  <label class="form-check-label" for="jugueteria">Juguetería</label>
                </div>
              </div>
              <div class="col-6 col-md-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="Vida Sana" id="vidasana">
                  <label class="form-check-label" for="vidasana">Vida Sana</label>
                </div>
              </div>
            </div>
          </div>

          <!-- Contraseñas -->
          <div class="row mt-4">
            <div class="col-md-6">
              <input type="password" class="form-control" placeholder="Contraseña" required>
            </div>
            <div class="col-md-6">
              <input type="password" class="form-control" placeholder="Confirmar contraseña" required>
            </div>
          </div>

          <!-- Botones -->
          <div class="d-flex justify-content-between mt-4">
            <button type="submit" class="btn btn-primary w-50 me-2">Registrar</button>
            <button type="reset" class="btn btn-danger w-50 ms-2">Borrar</button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
